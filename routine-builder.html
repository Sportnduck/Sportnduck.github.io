<h1 style="text-align:center;color:#7A6A4F;margin-top:60px;">
Build Your Custom Routine
</h1>

<p style="text-align:center;max-width:600px;margin:10px auto 50px;">
Choose your skin goal, skin type, and age range to reveal a thoughtful skincare routine.
</p>

<div style="display:flex;justify-content:center;margin-top:60px;">

<div style="background:#f6f4ef;padding:30px;border-radius:12px;width:320px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);">

<h3 style="text-align:center;color:#7A6A4F;margin-bottom:20px;">
Customize Your Routine
</h3>

<label style="font-weight:600;">Skin Goal</label>
<select id="goal" style="width:100%;padding:10px;margin-top:6px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;">
<option>Glow & Brightening</option>
<option>Hydration</option>
<option>Acne Support</option>
<option>Firmness</option>
<option>Calming & Repair</option>
</select>

<label style="font-weight:600;">Skin Type</label>
<select id="type" style="width:100%;padding:10px;margin-top:6px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;">
<option>Normal</option>
<option>Dry</option>
<option>Oily</option>
<option>Combination</option>
<option>Sensitive</option>
</select>

<label style="font-weight:600;">Age Range</label>
<select id="age" style="width:100%;padding:10px;margin-top:6px;margin-bottom:20px;border-radius:6px;border:1px solid #ccc;">
<option>20s</option>
<option>30s</option>
<option>40s</option>
<option>50+</option>
</select>
  <label style="font-weight:600;">Skin Concern</label>
<select id="concern" style="width:100%;padding:10px;margin-top:6px;margin-bottom:20px;border-radius:6px;border:1px solid #ccc;">
<option>None</option>
<option>Rosacea</option>
<option>Melasma</option>
<option>Sensitive Skin</option>
<option>Acne-Prone</option>
<option>Hyperpigmentation</option>
<option>Barrier Damage</option>
</select>
 
<button onclick="showRoutine()"
style="width:100%;background:#7A6A4F;color:white;padding:12px;border:none;border-radius:8px;font-weight:600;cursor:pointer;">
Reveal My Routine
</button>

<button onclick="location.reload()"
style="width:100%;margin-top:10px;background:#e5e2d9;color:#333;padding:10px;border:none;border-radius:8px;cursor:pointer;">
Start Over
</button>
 </div>
 </div>
<div id="routineResult" style="max-width:600px;margin:40px auto;text-align:center;"></div>
<div style="text-align:center;margin:50px 0;">
<a href="skin-science.html"
style="display:inline-block;color:#7A6A4F;text-decoration:none;font-weight:600;font-size:16px;">
← Back to Skin Science
</a>
</div>


<script>
function showRoutine() {
  let goal = document.getElementById("goal").value;
  let type = document.getElementById("type").value;
  let age = document.getElementById("age").value;
  let concern = document.getElementById("concern").value;

  let morning = "Gentle Cleanser • Vitamin C Serum • Moisturizer • Sunscreen";
  let evening = "Cleanser • Treatment Serum • Moisturizer";
  let ingredients = "";
  let notes = "";
  let led = "";

  if (goal === "Glow & Brightening") {
    ingredients = "Vitamin C • Niacinamide • Gentle Exfoliation";
  }
  if (goal === "Hydration") {
    ingredients = "Hyaluronic Acid • Ceramides • Barrier Support";
  }
  if (goal === "Acne Support") {
    ingredients = "Niacinamide • Clarifying Support • Oil Balance";
  }
  if (goal === "Firmness") {
    ingredients = "Peptides • Retinol • Collagen Support";
  }
  if (goal === "Calming & Repair") {
    ingredients = "Ceramides • Niacinamide • Barrier Repair Ingredients";
  }

  if (concern === "Rosacea") {
    morning = "Gentle Cleanser • Calming Serum • Moisturizer • Mineral Sunscreen";
    evening = "Gentle Cleanser • Barrier-Support Serum • Moisturizer";
    ingredients = "Niacinamide • Azelaic Acid • Ceramides";
    notes = "Focus on calming, barrier support, and avoiding over-exfoliation.";
led = "Yellow LED light may help support redness and sensitive skin. 🟡";
  }       
       
  if (concern === "Melasma") {
    morning = "Gentle Cleanser • Brightening Serum • Moisturizer • Broad-Spectrum Sunscreen";
    evening = "Cleanser • Pigment-Support Treatment • Moisturizer";
    ingredients = "Vitamin C • Tranexamic Acid • Niacinamide";
    notes = "Consistency and daily sun protection are essential for melasma-prone skin.";
    led = "Green LED light may help support a more even-looking skin tone. 🟢";
  }

  if (concern === "Sensitive Skin") {
    morning = "Gentle Cleanser • Hydrating Serum • Moisturizer • Sunscreen";
    evening = "Gentle Cleanser • Niacinamide or Ceramide Support • Moisturizer";
    ingredients = "Ceramides • Niacinamide • Panthenol";
    notes = "Choose fragrance-free, barrier-friendly formulas and introduce actives slowly.";
   led = "Yellow LED light may help support redness and sensitive skin. 🟡";
  }

  if (concern === "Acne-Prone") {
    morning = "Gentle Cleanser • Niacinamide Serum • Lightweight Moisturizer • Sunscreen";
    evening = "Cleanser • Clarifying Treatment • Moisturizer";
    ingredients = "Niacinamide • Salicylic Support • Oil Balance";
    notes = "Look for balancing ingredients and avoid overly harsh stripping routines.";
    led = "Blue LED light may help support acne-prone skin and reduce bacteria on the skin. 🔵";
  }

  if (concern === "Hyperpigmentation") {
    morning = "Gentle Cleanser • Vitamin C or Brightening Serum • Moisturizer • Sunscreen";
    evening = "Cleanser • Tone-Evening Treatment • Moisturizer";
    ingredients = "Vitamin C • Niacinamide • Brightening Support";
    notes = "Brightening ingredients and sun protection help support a more even skin tone.";
    led = "Green LED light may help support a more even-looking skin tone.";
  }

  if (concern === "Barrier Damage") {
    morning = "Gentle Cleanser • Hydrating Serum • Ceramide-Rich Moisturizer • Sunscreen";
    evening = "Gentle Cleanser • Barrier Repair Serum • Rich Moisturizer";
    ingredients = "Ceramides • Hyaluronic Acid • Barrier Repair Support";
    notes = "Pause aggressive exfoliation and focus on hydration and repair.";
    led = "Red LED light may help support skin repair and collagen activity.";
  }

  let routine = `
  <div style="max-width:650px;margin:40px auto;background:#ffffff;padding:30px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,0.08);">
    <h2 style="color:#7A6A4F;margin-bottom:20px;text-align:center;">Your Personalized Routine</h2>

    <p><b>Skin Goal:</b> ${goal}</p>
    <p><b>Skin Type:</b> ${type}</p>
    <p><b>Age Range:</b> ${age}</p>
    <p><b>Skin Concern:</b> ${concern}</p>
    <p><b>Recommended Ingredient Focus:</b> ${ingredients}</p>

    <div style="background:#f4efe6;padding:20px;border-radius:10px;margin-top:20px;">
      <p style="font-weight:600;margin-bottom:5px;">Morning Routine</p>
      <p>${morning}</p>

      <p style="font-weight:600;margin-top:15px;margin-bottom:5px;">Evening Routine</p>
      <p>${evening}</p>

      ${notes ? `<p style="margin-top:15px;font-size:14px;"><b>Note:</b> ${notes}</p>` : ""}
      ${led ? `<p style="margin-top:10px;font-size:14px;"><b>LED Therapy Suggestion:</b> ${led}</p>` : ""}
    </div>

    <p style="margin-top:20px;font-size:14px;color:#666;text-align:center;">
      Skincare is personal. This routine is a thoughtful starting point based on your selections.
    </p>

    <p style="margin-top:15px;text-align:center;">
      <a href="contact.html" style="color:#7A6A4F;font-weight:600;text-decoration:none;">
        Refine your routine with our personal shopping experience →
      </a>
    </p>

    <p style="text-align:center;margin-top:15px;">
      <button onclick="saveRoutine()" style="background:#7A6A4F;color:white;border:none;padding:12px 22px;border-radius:8px;font-size:14px;cursor:pointer;">
        Save My Routine
      </button>
    </p>

    <p style="text-align:center;margin-top:10px;">
      <button onclick="emailRoutine()" style="background:#A89573;color:white;border:none;padding:12px 22px;border-radius:8px;font-size:14px;cursor:pointer;">
        Email My Routine
      </button>
    </p>
  </div>
  `;

  document.getElementById("routineResult").innerHTML = routine;
}

function saveRoutine() {
  let routineText = document.getElementById("routineResult").innerText;
  let blob = new Blob([routineText], { type: "text/plain" });
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "sportnduck-skincare-routine.txt";
  link.click();
}

function emailRoutine() {
  let routineText = document.getElementById("routineResult").innerText;
  let subject = "My Sportnduck Skincare Routine";
  let body = encodeURIComponent(routineText);
  window.location.href = "mailto:?subject=" + subject + "&body=" + body;
}
</script>
