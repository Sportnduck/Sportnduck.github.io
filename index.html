<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    :root{
      --brand:#8a7658;
      --brand-deep:#6f5e46;
      --cream:#f7f2eb;
      --cream-2:#efe6da;
      --card:#fffaf4;
      --line:#e7ddd0;
      --text:#3a3128;
      --muted:#7b6e60;
      --shadow:0 14px 34px rgba(86, 65, 39, 0.10);
      --radius:22px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Georgia, serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #fbf8f3 0%, #f5eee4 45%, #efe6da 100%);
    }

    header{
      background:linear-gradient(135deg, #9a8768 0%, #7c6a4f 100%);
      color:#fffdf9;
      text-align:center;
      padding:70px 20px 58px;
      box-shadow:var(--shadow);
    }

    .eyebrow{
      font-size:13px;
      letter-spacing:2.5px;
      text-transform:uppercase;
      margin-bottom:14px;
      opacity:.95;
    }

    h1{
      margin:0;
      font-size:58px;
      line-height:1.05;
      letter-spacing:.5px;
      font-weight:700;
    }

    .subhead{
      max-width:880px;
      margin:20px auto 0;
      font-size:20px;
      line-height:1.75;
      opacity:.97;
    }

    main{
      max-width:1180px;
      margin:0 auto;
      padding:38px 22px 70px;
    }

    .panel{
      background:rgba(255,250,244,.86);
      border:1px solid rgba(138,118,88,.12);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:30px;
      margin-bottom:24px;
      backdrop-filter:blur(6px);
    }

    .panel h2{
      margin:0 0 12px;
      color:var(--brand-deep);
      font-size:34px;
    }

    .panel p{
      margin:0;
      line-height:1.8;
      font-size:18px;
      color:var(--muted);
    }

    .layers-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:16px;
      margin-top:20px;
    }

    .layer-card{
      background:linear-gradient(180deg, #fffdf9 0%, #faf4ec 100%);
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      box-shadow:0 8px 22px rgba(86,65,39,0.06);
    }

    .layer-card strong{
      display:block;
      font-size:28px;
      color:var(--brand-deep);
      margin-bottom:8px;
    }

    .section-head{
      margin:34px 0 18px;
    }

    .section-head h2{
      margin:0 0 8px;
      font-size:40px;
      color:var(--brand-deep);
    }

    .section-head p{
      margin:0;
      color:var(--muted);
      font-size:18px;
      line-height:1.7;
    }

    .ingredients-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(265px,1fr));
      gap:20px;
    }

    .ingredient-card{
      background:linear-gradient(180deg, #fffdf9 0%, #fbf5ed 100%);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .ingredient-card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 36px rgba(86,65,39,0.14);
    }

    .ingredient-top{
      padding:22px 22px 14px;
    }

    .tag{
      display:inline-block;
      background:var(--brand);
      color:white;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      letter-spacing:1px;
      text-transform:uppercase;
      margin-bottom:14px;
    }
